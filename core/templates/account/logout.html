{% extends 'core/base.html' %}

{% block title %}Sign Out{% endblock %}

{% block content %}
<div class="card shadow-lg border-0 rounded-4 mx-auto mt-5" style="width: 350px;">
    <div class="card-body p-4 text-center">
        <h2 class="fw-bold mb-3">Sign Out</h2>
        <p class="text-muted mb-4">Are you sure you want to sign out?</p>
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
            {% endif %}
            <div class="d-flex justify-content-center gap-3">
                <button type="submit" class="btn btn-danger btn-sm">Sign Out</button>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
