<div class="sidebar-sticky">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header border-0 py-3 px-4" style="background:linear-gradient(135deg,#667eea,#764ba2);">
            <h6 class="mb-0 text-white fw-semibold"><i class="fas fa-book me-2"></i>Subjects</h6>
        </div>
        <div class="px-3 py-3">
            <ul class="category-tree list-unstyled">
                {% for subject in subjects %}
                <li>
                    <a href="?subject={{ subject.id }}{% if query %}&q={{ query }}{% endif %}#main-content"
                       class="d-flex justify-content-between align-items-center {% if selected == subject.id|stringformat:'s' %}active{% endif %}">
                        <span class="text-truncate">{{ subject.name }}</span>
                        {% if subject.num_notes is not None %}
                        <span class="badge rounded-pill ms-2 flex-shrink-0
                            {% if selected == subject.id|stringformat:'s' %}bg-primary text-white{% else %}bg-primary-subtle text-primary{% endif %}">
                            {{ subject.num_notes }}
                        </span>
                        {% endif %}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
